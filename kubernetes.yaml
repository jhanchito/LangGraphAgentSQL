apiVersion: v1
kind: Namespace
metadata:
  name: multiagentsql-integratel

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiagentsqlteradata
  namespace: multiagentsql-integratel
  labels:
    app: multiagentsqlteradata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multiagentsqlteradata
  template:
    metadata:
      labels:
        app: multiagentsqlteradata
    spec:
      containers:
        - name: multiagentsqlteradata
          image: acrbilab.azurecr.io/multiagentsqlteradata:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
          # Add other environment variables here if needed, e.g. from .env

---
apiVersion: v1
kind: Service
metadata:
  name: multiagentsqlteradata-svc
  namespace: multiagentsql-integratel
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "SNET-arq-pe-lab-aks"
spec:
  type: LoadBalancer
  selector:
    app: multiagentsqlteradata
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
